name: refresh_rate
description: >-
  Unlock 90/120/144Hz on Android, iOS & desktop. Query display rates, control
  refresh, benchmark FPS with live debug overlays. Uses modern platform APIs.
version: 1.0.0
homepage: https://qoder.in/resources/refresh_rate
repository: https://github.com/qoder-official/refresh_rate
issue_tracker: https://github.com/qoder-official/refresh_rate/issues
documentation: https://pub.dev/documentation/refresh_rate/latest/

topics:
  - display
  - performance
  - animation
  - debug
  - ui

screenshots:
  - description: "Live FPS overlay showing 120 FPS with frame budget diagnostics"
    path: screenshots/fps.png
  - description: "Hz badge confirming 120Hz refresh rate on a real device"
    path: screenshots/hz.png

funding:
  - https://github.com/sponsors/qoder-official

environment:
  sdk: ^3.5.0
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  plugin_platform_interface: ^2.1.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  pigeon: ^22.0.0

flutter:
  plugin:
    platforms:
      android:
        package: in.qoder.refresh_rate
        pluginClass: RefreshRatePlugin
      ios:
        pluginClass: RefreshRatePlugin
      linux:
        pluginClass: RefreshRatePlugin
      macos:
        pluginClass: RefreshRatePlugin
      windows:
        pluginClass: RefreshRatePluginCApi
      web:
        pluginClass: RefreshRateWeb
        fileName: refresh_rate_web.dart
